{% extends "base.html" %}
{% block title %}Post Job - Campus Placement System by PRABHAV Holistic Health Institute{% endblock %}
{% block body %}
<div class="d-flex">
    <div class="sidebar d-none d-md-block" style="background: linear-gradient(180deg, #0d5c2e, #1a7d3e);">
        <nav class="nav flex-column">
            <a class="nav-link" href="{{ url_for('company_dashboard') }}"><i class="bi bi-grid me-2"></i>Dashboard</a>
            <a class="nav-link active" href="{{ url_for('company_post_job') }}"><i class="bi bi-plus-circle me-2"></i>Post Job</a>
            <a class="nav-link" href="{{ url_for('company_jobs') }}"><i class="bi bi-briefcase me-2"></i>My Jobs</a>
        </nav>
    </div>
    <div class="main-content flex-grow-1">
        <h4 class="mb-4">Post a Job</h4>
        <div class="card">
            <div class="card-body">
                <form method="post" action="{{ url_for('company_post_job') }}">
                    <div class="mb-3">
                        <label class="form-label">Job Title *</label>
                        <input type="text" class="form-control" name="job_title" required placeholder="e.g. Software Engineer">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Job Description</label>
                        <textarea class="form-control" name="job_description" rows="4" placeholder="Describe the role and responsibilities"></textarea>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Salary / CTC</label>
                            <input type="text" class="form-control" name="salary" placeholder="e.g. 8 LPA">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Location</label>
                            <input type="text" class="form-control" name="location" placeholder="e.g. Bangalore">
                        </div>
                    </div>
                    <div class="mb-3 mt-3">
                        <label class="form-label">Eligibility</label>
                        <input type="text" class="form-control" name="eligibility" placeholder="e.g. B.Tech, 7+ CGPA">
                    </div>
                    <button type="submit" class="btn btn-success">Post Job</button>
                    <a href="{{ url_for('company_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
